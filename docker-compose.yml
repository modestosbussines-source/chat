services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: omni_app
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - omni
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads:rw
      - ./audio:/app/audio:rw

  db:
    image: postgres:17-alpine
    container_name: omni_db
    restart: unless-stopped
    networks:
      - omni
    environment:
      POSTGRES_USER: ${OMNI_DATABASE_USER:-omni}
      POSTGRES_PASSWORD: ${OMNI_DATABASE_PASSWORD}
      POSTGRES_DB: ${OMNI_DATABASE_NAME:-omni}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${OMNI_DATABASE_NAME:-omni}", "-U", "${OMNI_DATABASE_USER:-omni}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-data-v3:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omni_redis
    restart: unless-stopped
    networks:
      - omni
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

networks:
  omni:

volumes:
  postgres-data-v3:
  redis-data:
