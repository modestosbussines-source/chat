services:
  # Omni App
  app:
    image: omni/omni:latest
    container_name: omni_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - omni
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads:rw
      - ./config.toml:/app/config.toml:ro
    command: ["server", "-migrate", "-config", "/app/config.toml"]
    # Segurança: rodar como non-root
    # user: "1000:1000"  # Descomente quando configurado

  # PostgreSQL database
  db:
    image: postgres:17-alpine
    container_name: omni_db
    restart: unless-stopped
    networks:
      - omni
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Senha do PostgreSQL obrigatória!}
      POSTGRES_DB: ${POSTGRES_DB:-omni}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni} -d ${POSTGRES_DB:-omni}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Segurança: argumentos SSL
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
        -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  # Redis
  redis:
    image: redis:7-alpine
    container_name: omni_redis
    restart: unless-stopped
    networks:
      - omni
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    # Segurança: senha Redis (configure no .env)
    command: redis-server --requirepass ${REDIS_PASSWORD:-}

networks:
  omni:

volumes:
  postgres-data:
  redis-data:
